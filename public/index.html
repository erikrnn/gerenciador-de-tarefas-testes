<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Tarefas Acadêmicas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <p class="tag">Projeto de Testes de Software</p>
      <h1>Minhas Tarefas Acadêmicas</h1>
      <p>Organize atividades, provas e trabalhos em um só lugar.</p>
    </header>

    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title">Nova tarefa</h2>
      <form id="task-form">
        <div class="field">
          <label for="task-title">Título</label>
          <input id="task-title" name="title" type="text" maxlength="60" placeholder="Ex.: Estudar para prova" required>
        </div>

        <div class="field">
          <label for="task-priority">Prioridade</label>
          <select id="task-priority" name="priority">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
          </select>
        </div>

        <button type="submit">Adicionar tarefa</button>
        <p id="form-message" class="message" role="alert"></p>
      </form>
    </section>

    <section class="card" aria-labelledby="list-title">
      <div class="section-header">
        <div>
          <h2 id="list-title">Lista de tarefas</h2>
          <p id="task-summary">0 tarefas cadastradas</p>
        </div>

        <label class="filter-label" for="task-filter">
          Filtrar
          <select id="task-filter">
            <option value="todas">Todas</option>
            <option value="pendentes">Pendentes</option>
            <option value="concluidas">Concluídas</option>
          </select>
        </label>
      </div>

      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty-state">Nenhuma tarefa cadastrada.</p>
    </section>
  </main>

  <script src="js/task-utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
